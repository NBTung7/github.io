<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index Advanced</title>
    <script>
        // Function to save data to local storage
        function saveData() {
            const input = document.getElementById('dataInput').value;
            if (input) {
                localStorage.setItem('savedData', input);
                alert('Data saved successfully!');
            } else {
                alert('Please enter some data to save.');
            }
        }

        // Function to load data from local storage
        function loadData() {
            const savedData = localStorage.getItem('savedData');
            const output = document.getElementById('output');
            if (savedData) {
                output.textContent = 'Saved Data: ' + savedData;
            } else {
                output.textContent = 'No data found.';
            }
        }

        // Add error handling
        window.onload = () => {
            try {
                loadData();
            } catch (error) {
                console.error('An error occurred while loading data:', error);
                alert('Failed to load data.');
            }
        };
    </script>
</head>
<body>
    <h1>Enhanced Index Page</h1>
    <input type="text" id="dataInput" placeholder="Enter some data" />
    <button onclick="saveData()">Save Data</button>
    <div id="output"></div>
</body>
</html>
