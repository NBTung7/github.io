<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>广东全境点选结算 v36.0</title>
    
    <script type="text/javascript">
        window._AMapSecurityConfig = { securityJsCode: 'b559741e31149204588581114b731b79', }; 
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=d40b46f59c6ac01013fb25c663857fff&plugin=AMap.Driving,AMap.DistrictSearch"></script>

    <style>
        :root { --amap-blue: #007AFF; --ios-bg: #f2f2f7; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: var(--ios-bg); margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; }

        .map-wrap { width: 100%; height: 200px; border-radius: 18px; overflow: hidden; border: 1px solid #d1d1d6; margin-bottom: 8px; }
        #amap-box { width: 100%; height: 100%; }

        .panel { background: white; border-radius: 24px; padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        /* 级联选择器样式 */
        .select-group { margin-bottom: 15px; background: #f9f9fb; padding: 12px; border-radius: 14px; border: 1px solid #e5e5ea; }
        .select-title { font-size: 12px; color: #8e8e93; margin-bottom: 8px; font-weight: bold; display: block; }
        .cascader { display: flex; gap: 5px; margin-bottom: 10px; }
        select { flex: 1; padding: 10px 5px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; background: white; -webkit-appearance: none; }

        .btn-run { width: 100%; padding: 16px; border: none; border-radius: 14px; color: white; font-weight: bold; font-size: 17px; background: var(--amap-blue); cursor: pointer; margin-bottom: 15px; }

        /* 结果与计费保持一致 */
        .best-route-info { background: #f2f8ff; padding: 15px; border-radius: 14px; border: 1.5px solid #d0e7ff; margin-bottom: 15px; display: none; text-align: center; }
        .best-route-info div { display: flex; justify-content: space-around; margin-top: 8px; }
        .info-item { display: flex; flex-direction: column; gap: 4px; }
        .info-label { font-size: 11px; color: #7a9cb5; }
        .info-val { font-size: 17px; font-weight: bold; }

        .opt-row { display: flex; gap: 6px; margin-bottom: 8px; }
        .opt-btn { flex: 1; padding: 12px; border: 1.5px solid #d1d1d6; border-radius: 10px; text-align: center; font-size: 13px; background: white; font-weight: bold; }
        .opt-btn.active { border-color: var(--amap-blue); background: #f2f8ff; color: var(--amap-blue); }
        
        #pax-inputs input { margin-bottom: 8px; border-radius: 10px; border: 1px solid #eee; padding: 12px; width: 100%; box-sizing: border-box; font-size: 15px; }
        .res-panel { margin-top: 15px; padding: 15px; background: #fff; border-radius: 15px; border: 2px solid var(--amap-blue); }
        .res-line { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; font-size: 17px; font-weight: bold; color: #003e7e; }
    </style>
</head>
<body>

<div class="container">
    <div class="map-wrap"><div id="amap-box"></div></div>

    <div class="panel">
        <div class="select-group">
            <span class="select-title">📍 选择起点 (广东省内)</span>
            <div class="cascader">
                <select id="s-city" onchange="loadDistrict('s', this.value)"><option>加载城市...</option></select>
                <select id="s-dist" onchange="loadStreet('s', this.value)"><option>选择区县</option></select>
                <select id="s-street"><option>选择乡镇</option></select>
            </div>
        </div>

        <div class="select-group">
            <span class="select-title">🏁 选择终点 (广东省内)</span>
            <div class="cascader">
                <select id="e-city" onchange="loadDistrict('e', this.value)"><option>加载城市...</option></select>
                <select id="e-dist" onchange="loadStreet('e', this.value)"><option>选择区县</option></select>
                <select id="e-street"><option>选择乡镇</option></select>
            </div>
        </div>
        
        <button class="btn-run" onclick="planBest()">🔍 开始精准导航计费</button>

        <div id="routeInfo" class="best-route-info">
            <span style="font-size: 12px; font-weight: bold; color: var(--amap-blue);">最佳路径数据</span>
            <div>
                <div class="info-item"><span class="info-label">里程</span><span class="info-val"><span id="r-dist">0</span>km</span></div>
                <div class="info-item"><span class="info-label">路费</span><span class="info-val"><span id="r-toll">0</span>元</span></div>
                <div class="info-item"><span class="info-label">总价</span><span class="info-val" style="color:var(--danger)">￥<span id="r-price">0</span></span></div>
            </div>
        </div>

        <div class="opt-row">
            <div class="opt-btn" id="p3" onclick="chPax(3)">3人</div>
            <div class="opt-btn active" id="p4" onclick="chPax(4)">4人</div>
            <div class="opt-btn active" id="mS" onclick="chMode('seg')">分段</div>
            <div class="opt-btn" id="mA" onclick="chMode('avg')">平摊</div>
        </div>

        <div id="pax-inputs">
            <input type="number" id="v1" placeholder="乘客1里程" oninput="calculate()">
            <input type="number" id="v2" placeholder="乘客2里程" oninput="calculate()">
            <input type="number" id="v3" placeholder="乘客3里程" oninput="calculate()">
            <input type="number" id="v4" placeholder="乘客4里程" oninput="calculate()">
        </div>

        <div class="res-panel"><div id="final-res" style="text-align:center;color:#999;font-size: 14px;">请选择起终点并点击规划</div></div>
    </div>
</div>

<script>
let aMap, districtSearch, totalKM = 0, totalPrice = 0, paxCount = 4, modeType = 'seg', driving = null;

function init() {
    aMap = new AMap.Map('amap-box', { zoom: 10 });
    districtSearch = new AMap.DistrictSearch({ subdistrict: 1, level: 'province', showbiz: false });
    
    // 初始化广东省的城市列表
    districtSearch.search('广东省', (status, result) => {
        if(status === 'complete') {
            const cities = result.districtList[0].districtList;
            fillSelect('s-city', cities);
            fillSelect('e-city', cities);
        }
    });
}

// 填充下拉框
function fillSelect(id, list) {
    const el = document.getElementById(id);
    el.innerHTML = '<option value="">请选择</option>';
    list.sort((a,b)=>a.name.localeCompare(b.name, 'zh')).forEach(item => {
        el.innerHTML += `<option value="${item.name}">${item.name}</option>`;
    });
}

// 加载二级：区县
function loadDistrict(prefix, cityName) {
    if(!cityName) return;
    districtSearch.setLevel('city');
    districtSearch.search(cityName, (status, result) => {
        if(status === 'complete') fillSelect(prefix + '-dist', result.districtList[0].districtList);
    });
}

// 加载三级：乡镇街道
function loadStreet(prefix, distName) {
    if(!distName) return;
    districtSearch.setLevel('district');
    districtSearch.search(distName, (status, result) => {
        if(status === 'complete') fillSelect(prefix + '-street', result.districtList[0].districtList);
    });
}

function planBest() {
    const sC = document.getElementById('s-city').value, sD = document.getElementById('s-dist').value, sS = document.getElementById('s-street').value;
    const eC = document.getElementById('e-city').value, eD = document.getElementById('e-dist').value, eS = document.getElementById('e-street').value;
    
    if(!sS || !eS) return alert("请选到具体的镇/街道再规划");

    const startPoint = `广东省${sC}${sD}${sS}`;
    const endPoint = `广东省${eC}${eD}${eS}`;

    if(driving) driving.clear();
    driving = new AMap.Driving({ map: aMap, policy: AMap.DrivingPolicy.LEAST_TIME });
    
    driving.search([{keyword: startPoint},{keyword: endPoint}], (status, result) => {
        if (status === 'complete') {
            const route = result.routes[0];
            totalKM = (route.distance / 1000).toFixed(1);
            const toll = route.tolls || 0;
            totalPrice = (parseFloat(toll) + totalKM * 2.4).toFixed(1);
            document.getElementById('routeInfo').style.display = 'block';
            document.getElementById('r-dist').innerText = totalKM;
            document.getElementById('r-toll').innerText = toll;
            document.getElementById('r-price').innerText = totalPrice;
            calculate();
        } else {
            alert("路径搜索失败，请尝试选择相邻街道");
        }
    });
}

// 保留计费逻辑
function chPax(n) { paxCount = n; document.getElementById('p3').className=n==3?'opt-btn active':'opt-btn'; document.getElementById('p4').className=n==4?'opt-btn active':'opt-btn'; document.getElementById('v4').style.display=n==3?'none':'block'; calculate(); }
function chMode(m) { modeType = m; document.getElementById('mS').className=m=='seg'?'opt-btn active':'opt-btn'; document.getElementById('mA').className=m=='avg'?'opt-btn active':'opt-btn'; document.getElementById('pax-inputs').style.display=m=='avg'?'none':'block'; calculate(); }

function calculate() {
    if(!totalKM || !totalPrice) return;
    const rate = totalPrice / totalKM;
    let html = "";
    if(modeType === 'avg') {
        const per = totalPrice / paxCount;
        for(let i=1; i<=paxCount; i++) html += `<div class="res-line"><span>乘客 ${i}</span><b>${per.toFixed(2)} 元</b></div>`;
    } else {
        let items = [];
        for(let i=1; i<=paxCount; i++) {
            let v = parseFloat(document.getElementById('v'+i).value) || 0;
            items.push({ id: i, dist: Math.min(v, totalKM) });
        }
        let sorted = [...items].sort((a,b) => a.dist - b.dist);
        let resMap = {}; items.forEach(x => resMap[x.id] = 0);
        let last = 0, count = paxCount;
        for (let i = 0; i < sorted.length; i++) {
            let seg = sorted[i].dist - last;
            if (seg > 0) {
                let cost = (seg * rate) / count;
                sorted.slice(i).forEach(x => resMap[x.id] += cost);
            }
            last = sorted[i].dist;
            count--;
        }
        items.forEach(x => { html += `<div class="res-line"><span>乘客 ${x.id} (${x.dist}km)</span><b>${resMap[x.id].toFixed(2)} 元</b></div>`; });
    }
    document.getElementById('final-res').innerHTML = html;
}

window.onload = init;
</script>
</body>
</html>
