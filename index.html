<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>高德极简结算 v34.0</title>
    
    <script type="text/javascript">
        window._AMapSecurityConfig = { securityJsCode: 'b559741e31149204588581114b731b79', }; 
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=d40b46f59c6ac01013fb25c663857fff&plugin=AMap.Driving,AMap.AutoComplete"></script>

    <style>
        :root { --amap-blue: #007AFF; --ios-bg: #f2f2f7; --danger: #ff3b30; --success: #34c759; }
        body { font-family: -apple-system, sans-serif; background: var(--ios-bg); margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 600px; margin: auto; }

        /* 地图区 */
        .map-wrap { width: 100%; height: 260px; background: #fff; border-radius: 18px; position: relative; overflow: hidden; border: 1px solid #d1d1d6; margin-bottom: 8px; }
        #amap-box { width: 100%; height: 100%; }

        /* 地图下方控制按钮 */
        .map-ctrl { display: flex; gap: 8px; margin-bottom: 12px; }
        .map-ctrl-btn { flex: 1; padding: 10px; background: white; border: 1px solid #d1d1d6; border-radius: 10px; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .map-ctrl-btn:active { background: #f2f2f7; }

        .panel { background: white; border-radius: 24px; padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        /* 搜索框 */
        .input-group { position: relative; margin-bottom: 10px; }
        .input-group input { width: 100%; padding: 14px; border: 1px solid #e5e5ea; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; background: #f9f9fb; }
        .input-group input:focus { border-color: var(--amap-blue); background: #fff; }

        .btn-run { width: 100%; padding: 16px; border: none; border-radius: 14px; color: white; font-weight: bold; font-size: 17px; background: var(--amap-blue); cursor: pointer; margin-bottom: 15px; }

        /* 路径信息栏 */
        .best-route-info { background: #f2f8ff; padding: 15px; border-radius: 14px; border: 1.5px solid #d0e7ff; margin-bottom: 15px; display: none; text-align: center; }
        .best-route-info div { display: flex; justify-content: space-around; margin-top: 8px; }
        .info-item { display: flex; flex-direction: column; gap: 4px; }
        .info-label { font-size: 11px; color: #7a9cb5; }
        .info-val { font-size: 17px; font-weight: bold; color: #1c1c1e; }
        .info-val.price { color: var(--danger); }

        /* 模式切换 */
        .opt-row { display: flex; gap: 6px; margin-bottom: 8px; }
        .opt-btn { flex: 1; padding: 12px; border: 1.5px solid #d1d1d6; border-radius: 10px; text-align: center; font-size: 13px; background: white; font-weight: bold; }
        .opt-btn.active { border-color: var(--amap-blue); background: #f2f8ff; color: var(--amap-blue); }
        
        #pax-inputs input { margin-bottom: 8px; border-radius: 10px; border: 1px solid #eee; padding: 12px; width: 100%; box-sizing: border-box; font-size: 15px; }
        
        /* 结果面板 */
        .res-panel { margin-top: 15px; padding: 15px; background: #fff; border-radius: 15px; border: 2px solid var(--amap-blue); box-shadow: 0 4px 12px rgba(0,122,255,0.1); }
        .res-line { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; font-size: 17px; font-weight: bold; color: #003e7e; }
        .res-line:last-child { border-bottom: none; }

        .amap-sug-result { border-radius: 10px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1) !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="map-wrap">
        <div id="amap-box"></div>
    </div>

    <div class="map-ctrl">
        <button class="map-ctrl-btn" onclick="recenter()">🎯 定位中心</button>
        <button class="map-ctrl-btn" onclick="location.reload()" style="color:var(--danger); border-color:var(--danger);">🧹 全部清空</button>
    </div>

    <div class="panel">
        <div class="input-group">
            <input type="text" id="sInput" placeholder="📍 输入起点..." autocomplete="off">
        </div>
        <div class="input-group">
            <input type="text" id="eInput" placeholder="🏁 输入终点..." autocomplete="off">
        </div>
        
        <button class="btn-run" id="mainBtn" onclick="planBest()">🔍 规划路线并计算</button>

        <div id="routeInfo" class="best-route-info">
            <span style="font-size: 12px; font-weight: bold; color: var(--amap-blue);">已为您选择高德最佳路线</span>
            <div>
                <div class="info-item"><span class="info-label">里程</span><span class="info-val"><span id="r-dist">0</span>km</span></div>
                <div class="info-item"><span class="info-label">路费</span><span class="info-val"><span id="r-toll">0</span>元</span></div>
                <div class="info-item"><span class="info-label">总价</span><span class="info-val price">￥<span id="r-price">0</span></span></div>
            </div>
        </div>

        <div class="opt-row">
            <div class="opt-btn" id="p3" onclick="chPax(3)">3人</div>
            <div class="opt-btn active" id="p4" onclick="chPax(4)">4人</div>
            <div class="opt-btn active" id="mS" onclick="chMode('seg')">分段</div>
            <div class="opt-btn" id="mA" onclick="chMode('avg')">平摊</div>
        </div>

        <div id="pax-inputs">
            <input type="number" id="v1" placeholder="乘客1里程" oninput="calculate()">
            <input type="number" id="v2" placeholder="乘客2里程" oninput="calculate()">
            <input type="number" id="v3" placeholder="乘客3里程" oninput="calculate()">
            <input type="number" id="v4" placeholder="乘客4里程" oninput="calculate()">
        </div>

        <div class="res-panel">
            <div id="final-res" style="text-align:center;color:#999;font-size: 14px;">等待路径数据...</div>
        </div>
    </div>
</div>

<script>
let aMap, aMarker, myLng, myLat, totalKM = 0, totalPrice = 0, paxCount = 4, modeType = 'seg';
let driving = null;

function init() {
    aMap = new AMap.Map('amap-box', { zoom: 14 });
    aMarker = new AMap.Marker({ map: aMap, icon: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png' });
    new AMap.AutoComplete({ input: "sInput" });
    new AMap.AutoComplete({ input: "eInput" });

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            myLng = pos.coords.longitude; myLat = pos.coords.latitude;
            aMarker.setPosition([myLng, myLat]);
        }, null, { enableHighAccuracy: true });
    }
}

function recenter() { if(myLng) aMap.setCenter([myLng, myLat]); aMap.setZoom(15); }

function planBest() {
    const s = document.getElementById('sInput').value, e = document.getElementById('eInput').value;
    if(!s || !e) return alert("请输入起终点");
    if(driving) driving.clear();
    driving = new AMap.Driving({ map: aMap, policy: AMap.DrivingPolicy.LEAST_TIME });
    driving.search([{keyword:s},{keyword:e}], (status, result) => {
        if (status === 'complete') {
            const route = result.routes[0];
            totalKM = (route.distance / 1000).toFixed(1);
            const toll = route.tolls || 0;
            totalPrice = (parseFloat(toll) + totalKM * 2.4).toFixed(1);
            document.getElementById('routeInfo').style.display = 'block';
            document.getElementById('r-dist').innerText = totalKM;
            document.getElementById('r-toll').innerText = toll;
            document.getElementById('r-price').innerText = totalPrice;
            calculate();
        }
    });
}

function chPax(n) { paxCount = n; document.getElementById('p3').className=n==3?'opt-btn active':'opt-btn'; document.getElementById('p4').className=n==4?'opt-btn active':'opt-btn'; document.getElementById('v4').style.display=n==3?'none':'block'; calculate(); }
function chMode(m) { modeType = m; document.getElementById('mS').className=m=='seg'?'opt-btn active':'opt-btn'; document.getElementById('mA').className=m=='avg'?'opt-btn active':'opt-btn'; document.getElementById('pax-inputs').style.display=m=='avg'?'none':'block'; calculate(); }

function calculate() {
    if(!totalKM || !totalPrice) return;
    const rate = totalPrice / totalKM;
    let html = "";
    if(modeType === 'avg') {
        const per = totalPrice / paxCount;
        for(let i=1; i<=paxCount; i++) html += `<div class="res-line"><span>乘客 ${i}</span><b>${per.toFixed(2)} 元</b></div>`;
    } else {
        let items = [];
        for(let i=1; i<=paxCount; i++) {
            let v = parseFloat(document.getElementById('v'+i).value) || 0;
            items.push({ id: i, dist: Math.min(v, totalKM) });
        }
        let sorted = [...items].sort((a,b) => a.dist - b.dist);
        let resMap = {}; items.forEach(x => resMap[x.id] = 0);
        let last = 0, count = paxCount;
        for (let i = 0; i < sorted.length; i++) {
            let seg = sorted[i].dist - last;
            if (seg > 0) {
                let cost = (seg * rate) / count;
                sorted.slice(i).forEach(x => resMap[x.id] += cost);
            }
            last = sorted[i].dist;
            count--;
        }
        items.forEach(x => { html += `<div class="res-line"><span>乘客 ${x.id} (${x.dist}km)</span><b>${resMap[x.id].toFixed(2)} 元</b></div>`; });
    }
    document.getElementById('final-res').innerHTML = html;
}
window.onload = init;
</script>
</body>
</html>
