<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高速费分段助手 v3.0</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; padding: 15px; color: #333; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { text-align: center; margin-top: 0; color: #007AFF; font-size: 20px; }
        
        .section-title { font-size: 14px; font-weight: bold; color: #888; margin: 18px 0 10px 0; display: flex; align-items: center; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: #eee; margin-left: 10px; }

        input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 18px; background: #fafafa; margin-bottom: 10px; }
        
        /* 按钮通用样式 */
        .btn-group { display: flex; gap: 10px; margin-bottom: 5px; }
        .option-btn { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 12px; text-align: center; cursor: pointer; background: white; font-weight: bold; font-size: 15px; transition: all 0.2s; }
        .option-btn.active { border-color: #007AFF; background: #eef6ff; color: #007AFF; box-shadow: 0 4px 8px rgba(0,122,255,0.1); }

        /* 计算按钮 */
        .calc-btn { width: 100%; padding: 18px; background: #007AFF; color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; margin-top: 25px; cursor: pointer; }
        
        /* 结果展示 */
        .result-box { margin-top: 20px; padding: 15px; background: #f0f9ff; border-radius: 15px; display: none; border: 1px solid #bae1ff; }
        .res-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #cce5ff; font-size: 17px; }
        .res-item:last-child { border-bottom: none; }
        .res-item b { color: #007AFF; }
        .total-info { font-size: 13px; color: #777; margin-top: 12px; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚗 高速费分段结算</h2>
    
    <div class="section-title">1. 输入总里程 (km)</div>
    <input type="number" id="totalDist" placeholder="例如: 100" oninput="calc()">

    <div class="section-title">2. 选择费率 (元/km)</div>
    <div class="btn-group">
        <div class="option-btn active" id="r05" onclick="setRate(0.5)">0.5 元/km</div>
        <div class="option-btn" id="r06" onclick="setRate(0.6)">0.6 元/km</div>
    </div>

    <div class="section-title">3. 总分摊人数 (含司机?)</div>
    <div class="btn-group">
        <div class="option-btn" id="p3" onclick="setPeople(3)">3 人</div>
        <div class="option-btn active" id="p4" onclick="setPeople(4)">4 人</div>
        <div class="option-btn" id="p5" onclick="setPeople(5)">5 人</div>
    </div>

    <div id="passengerInputs">
        <div class="section-title">4. 乘客下车点里程 (km)</div>
        <input type="number" id="d1" placeholder="乘客1 下车点" oninput="calc()">
        <input type="number" id="d2" placeholder="乘客2 下车点" oninput="calc()">
        <input type="number" id="d3" placeholder="乘客3 下车点" oninput="calc()">
        <input type="number" id="d4" placeholder="乘客4 下车点" oninput="calc()">
    </div>

    <button class="calc-btn" onclick="calc()">生成结算单</button>

    <div id="result" class="result-box">
        <div id="resList"></div>
        <div class="total-info" id="summaryText"></div>
    </div>
</div>

<script>
let currentRate = 0.5;
let startPeople = 4;

function setRate(r) {
    currentRate = r;
    document.getElementById('r05').classList.toggle('active', r === 0.5);
    document.getElementById('r06').classList.toggle('active', r === 0.6);
    calc();
}

function setPeople(p) {
    startPeople = p;
    document.getElementById('p3').classList.toggle('active', p === 3);
    document.getElementById('p4').classList.toggle('active', p === 4);
    document.getElementById('p5').classList.toggle('active', p === 5);
    
    // 如果选3人，就隐藏第4个输入框，避免混淆
    document.getElementById('d4').style.display = (p === 3) ? 'none' : 'block';
    calc();
}

function calc() {
    const totalDist = parseFloat(document.getElementById('totalDist').value) || 0;
    if (totalDist <= 0) return;

    // 确定实际乘客数：如果是5人分(含司机)，则有4个乘客；如果是3人分(无司机)，则有3个乘客
    // 逻辑：乘客数 = 如果startPeople里包含司机，则乘客是startPeople-1，否则就是startPeople
    // 为了简单，我们直接根据按钮来定：
    let activePaxCount = (startPeople === 5) ? 4 : startPeople;
    
    let dists = [];
    for(let k=1; k<=4; k++) {
        let val = parseFloat(document.getElementById('d'+k).value) || 0;
        if (k <= activePaxCount) dists.push(val);
    }
    
    // 排序是为了逻辑正确，计算分段
    let sortedDists = [...dists].sort((a, b) => a - b);
    let sharesMap = {}; // 用里程作为key来存钱
    dists.forEach(d => sharesMap[d] = 0);

    let prevDist = 0;
    let currentPeopleInCar = startPeople;

    for (let i = 0; i < sortedDists.length; i++) {
        let currentPoint = Math.min(sortedDists[i], totalDist);
        let segmentLen = currentPoint - prevDist;
        
        if (segmentLen > 0 && currentPeopleInCar > 0) {
            let segmentCost = segmentLen * currentRate;
            let perPerson = segmentCost / currentPeopleInCar;
            
            // 还没下车的所有人（包括司机份额）都摊这一段
            // 我们只记录乘客的
            for (let d in sharesMap) {
                if (parseFloat(d) >= currentPoint) {
                    sharesMap[d] += perPerson;
                }
            }
        }
        prevDist = currentPoint;
        currentPeopleInCar--; // 下车一人
    }

    // 渲染结果
    const resList = document.getElementById('resList');
    const resultBox = document.getElementById('result');
    resList.innerHTML = "";
    resultBox.style.display = 'block';

    let idx = 1;
    for (let k=1; k<=4; k++) {
        if (k > activePaxCount) continue;
        let dVal = parseFloat(document.getElementById('d'+k).value) || 0;
        let money = sharesMap[dVal] || 0;
        resList.innerHTML += `<div class="res-item"><span>乘客 ${idx} (${dVal}km)</span><b>${money.toFixed(2)} 元</b></div>`;
        idx++;
    }

    document.getElementById('summaryText').innerHTML = 
        `设置：${startPeople}人平摊 | 费率：${currentRate}元/km<br>总里程：${totalDist}km | 总费用：<b>${(totalDist * currentRate).toFixed(2)}</b> 元`;
}
</script>

</body>
</html>
