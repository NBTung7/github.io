<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clock Draft</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --muted: #6f777d;
      --paper: #f6f1e8;
      --rim: #151515;
      --inner: #151515;
      --green: #6fbf73;
      --hand: #c84d32;
      --pin: #f6f1e8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100svh;
      overflow: hidden;
      background: linear-gradient(135deg, #e8eef0, #f7efe2 58%, #e6ece5);
      font-family: Inter, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--ink);
    }

    .stage {
      display: grid;
      place-items: center;
      width: min(86vmin, 620px);
      aspect-ratio: 1;
    }

    .clock {
      position: relative;
      width: 100%;
      height: 100%;
      border: clamp(2px, .45vmin, 4px) solid var(--rim);
      border-radius: 50%;
      background: var(--paper);
      box-shadow:
        0 34px 82px rgba(38, 42, 44, .2),
        inset 0 0 0 1px rgba(255, 255, 255, .75);
    }

    .outer-arc {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(var(--green) 0deg 60deg, transparent 60deg 240deg, var(--green) 240deg 300deg, transparent 300deg 360deg);
      -webkit-mask: radial-gradient(circle closest-side, transparent 0 76%, #000 76.4% 100%);
      mask: radial-gradient(circle closest-side, transparent 0 76%, #000 76.4% 100%);
      z-index: 1;
    }

    .outer-fill {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: #ffffff;
      -webkit-mask: radial-gradient(circle closest-side, transparent 0 76%, #000 76.4% 100%);
      mask: radial-gradient(circle closest-side, transparent 0 76%, #000 76.4% 100%);
      z-index: 0;
    }

    .middle-arc {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(transparent 0deg 210deg, var(--green) 210deg 360deg);
      -webkit-mask: radial-gradient(circle closest-side, transparent 0 52%, #000 52.4% 76%, transparent 76.4% 100%);
      mask: radial-gradient(circle closest-side, transparent 0 52%, #000 52.4% 76%, transparent 76.4% 100%);
      z-index: 1;
    }

    .inner-circle {
      position: absolute;
      inset: 24%;
      border: clamp(2px, .45vmin, 4px) solid var(--inner);
      border-radius: 50%;
      background: #ffffff;
      z-index: 2;
    }

    .middle-circle {
      position: absolute;
      inset: 12%;
      border: clamp(2px, .45vmin, 4px) solid var(--inner);
      border-radius: 50%;
      background: transparent;
      z-index: 2;
    }

    .number {
      position: absolute;
      width: 2.4em;
      height: 2.4em;
      display: grid;
      place-items: center;
      translate: -50% -50%;
      font-size: clamp(14px, 3.6vmin, 28px);
      font-weight: 650;
      line-height: 1;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      z-index: 3;
    }

    .n12 {
      left: 50%;
      top: 29.5%;
    }

    .n1 {
      left: 60.25%;
      top: 32.25%;
    }

    .n2 {
      left: 67.75%;
      top: 39.75%;
    }

    .n3 {
      left: 70.5%;
      top: 50%;
    }

    .n4 {
      left: 67.75%;
      top: 60.25%;
    }

    .n5 {
      left: 60.25%;
      top: 67.75%;
    }

    .n6 {
      left: 50%;
      top: 70.5%;
    }

    .n7 {
      left: 39.75%;
      top: 67.75%;
    }

    .n8 {
      left: 32.25%;
      top: 60.25%;
    }

    .n9 {
      left: 29.5%;
      top: 50%;
    }

    .n10 {
      left: 32.25%;
      top: 39.75%;
    }

    .n11 {
      left: 39.75%;
      top: 32.25%;
    }

    .hand {
      position: absolute;
      left: 50%;
      top: 50%;
      width: clamp(8px, 1.25vmin, 12px);
      height: calc(50% - clamp(2px, .45vmin, 4px));
      border-radius: 999px 999px 4px 4px;
      background: linear-gradient(180deg, #e46042, var(--hand));
      transform-origin: 50% 100%;
      transform: translate(-50%, -100%) rotate(0deg);
      box-shadow: 0 7px 20px rgba(160, 45, 25, .28);
      z-index: 3;
    }

    .center-pin {
      position: absolute;
      left: 50%;
      top: 50%;
      width: clamp(18px, 4.2vmin, 34px);
      aspect-ratio: 1;
      border: clamp(2px, .45vmin, 4px) solid var(--rim);
      border-radius: 50%;
      background: var(--pin);
      transform: translate(-50%, -50%);
      z-index: 4;
    }

    .time-readout {
      position: fixed;
      left: 50%;
      bottom: clamp(18px, 4vmin, 34px);
      translate: -50% 0;
      font-size: clamp(13px, 2.4vmin, 16px);
      color: var(--muted);
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Clock following local time">
    <section class="clock" aria-live="polite">
      <div class="outer-fill" aria-hidden="true"></div>
      <div class="outer-arc" aria-hidden="true"></div>
      <div class="middle-arc" aria-hidden="true"></div>
      <div class="middle-circle" aria-hidden="true"></div>
      <div class="inner-circle" aria-hidden="true"></div>
      <div class="number n12">12</div>
      <div class="number n1">1</div>
      <div class="number n2">2</div>
      <div class="number n3">3</div>
      <div class="number n4">4</div>
      <div class="number n5">5</div>
      <div class="number n6">6</div>
      <div class="number n7">7</div>
      <div class="number n8">8</div>
      <div class="number n9">9</div>
      <div class="number n10">10</div>
      <div class="number n11">11</div>
      <div class="hand" id="hourHand" aria-hidden="true"></div>
      <div class="center-pin" aria-hidden="true"></div>
    </section>
  </main>
  <div class="time-readout" id="timeReadout"></div>

  <script>
    const hourHand = document.getElementById("hourHand");
    const timeReadout = document.getElementById("timeReadout");

    function updateClock() {
      const now = new Date();
      const hours = now.getHours() % 12;
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();
      const milliseconds = now.getMilliseconds();
      const hourAngle = ((hours + minutes / 60 + seconds / 3600 + milliseconds / 3600000) * 30);

      hourHand.style.transform = `translate(-50%, -100%) rotate(${hourAngle}deg)`;
      timeReadout.textContent = now.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });

      requestAnimationFrame(updateClock);
    }

    updateClock();
  </script>
</body>
</html>
