<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>广东计费手机优化版 v49.0</title>
    
    <script type="text/javascript">
        window._AMapSecurityConfig = { securityJsCode: '17a5dd8e857eed4de7532d2c61b03872', }; 
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=1e1827b3250f2fc8380020d354978d39&plugin=AMap.Driving,AMap.DistrictSearch,AMap.AutoComplete,AMap.Geocoder"></script>

    <style>
        :root { --blue: #007AFF; --bg: #f2f2f7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 600px; margin: auto; }

        /* 地图布局 - 增加自适应高度 */
        .maps-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        #main-map { width: 100%; height: 180px; border-radius: 16px; border: 1px solid #d1d1d6; background: #fff; }
        .sub-row { display: flex; gap: 8px; height: 120px; }
        .sub-map-wrapper { flex: 1; position: relative; border-radius: 12px; border: 1px solid #d1d1d6; overflow: hidden; background: #fff; }
        .map-label { position: absolute; top: 0; left: 0; z-index: 10; background: rgba(0,0,0,0.6); color: white; font-size: 10px; padding: 3px 6px; border-bottom-right-radius: 8px; }

        /* 面板 */
        .panel { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .loc-box { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
        .select-row { display: flex; gap: 4px; margin-bottom: 8px; }
        select { flex: 1; padding: 12px 4px; border: 1px solid #e5e5ea; border-radius: 8px; font-size: 14px; background: #f9f9fb; outline: none; -webkit-appearance: none; } /* 统一手机下拉框样式 */
        .kw-input { width: 100%; padding: 14px; border: 1px solid #e5e5ea; border-radius: 10px; font-size: 15px; box-sizing: border-box; }

        .btn-calc { width: 100%; padding: 16px; border: none; border-radius: 14px; color: white; font-weight: bold; font-size: 18px; background: var(--blue); cursor: pointer; margin: 10px 0; -webkit-appearance: none; }
        
        /* 乘客部分 */
        .opt-row { display: flex; gap: 6px; margin: 12px 0; }
        .opt-btn { flex: 1; padding: 12px; border: 1.5px solid #d1d1d6; border-radius: 10px; text-align: center; font-size: 14px; background: white; font-weight: bold; }
        .opt-btn.active { border-color: var(--blue); background: #f2f8ff; color: var(--blue); }
        #pax-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        #pax-inputs input { border-radius: 10px; border: 1px solid #eee; padding: 12px; width: 100%; box-sizing: border-box; font-size: 15px; background: #fafafa; }
        
        .res-box { padding: 15px; background: #fff; border-radius: 15px; border: 2px solid var(--blue); margin-top: 15px; }
        .res-line { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="maps-grid">
        <div id="main-map"></div>
        <div class="sub-row">
            <div class="sub-map-wrapper"><span class="map-label">起点</span><div id="s-map" style="height:100%"></div></div>
            <div class="sub-map-wrapper"><span class="map-label">终点</span><div id="e-map" style="height:100%"></div></div>
        </div>
    </div>

    <div class="panel">
        <div class="loc-box">
            <div class="select-row">
                <select id="s-city"><option value="">市</option></select>
                <select id="s-dist"><option value="">区</option></select>
                <select id="s-town"><option value="">镇/街</option></select>
            </div>
            <input type="text" id="s-kw" class="kw-input" placeholder="搜起点关键词...">
        </div>

        <div class="loc-box">
            <div class="select-row">
                <select id="e-city"><option value="">市</option></select>
                <select id="e-dist"><option value="">区</option></select>
                <select id="e-town"><option value="">镇/街</option></select>
            </div>
            <input type="text" id="e-kw" class="kw-input" placeholder="搜终点关键词...">
        </div>
        
        <button class="btn-calc" onclick="runRoute()">🔍 开始路径规划</button>

        <div class="opt-row">
            <div class="opt-btn" id="p3" onclick="chPax(3)">3人</div>
            <div class="opt-btn active" id="p4" onclick="chPax(4)">4人</div>
            <div class="opt-btn active" id="mS" onclick="chMode('seg')">分段</div>
            <div class="opt-btn" id="mA" onclick="chMode('avg')">平摊</div>
        </div>

        <div id="pax-inputs">
            <input type="number" id="v1" placeholder="客1km" oninput="calculate()">
            <input type="number" id="v2" placeholder="客2km" oninput="calculate()">
            <input type="number" id="v3" placeholder="客3km" oninput="calculate()">
            <input type="number" id="v4" placeholder="客4km" oninput="calculate()">
        </div>

        <div id="final-res" class="res-box" style="text-align:center;color:#999;">等待结果...</div>
    </div>
</div>

<script>
let maps = {}, ds, geo, drv;
let totalKM = 0, totalPrice = 0, paxCount = 4, modeType = 'seg';

// 手机端初始化
function init() {
    maps.main = new AMap.Map('main-map', { zoom: 10 });
    maps.s = new AMap.Map('s-map', { zoom: 14 });
    maps.e = new AMap.Map('e-map', { zoom: 14 });
    
    ds = new AMap.DistrictSearch({ subdistrict: 1 });
    geo = new AMap.Geocoder();

    // 绑定事件：用 input 事件监听，手机响应更快
    ['s','e'].forEach(p => {
        document.getElementById(p+'-city').addEventListener('change', (e)=>subChange(p, e.target.value, 'city'));
        document.getElementById(p+'-dist').addEventListener('change', (e)=>subChange(p, e.target.value, 'district'));
        document.getElementById(p+'-town').addEventListener('change', ()=>updateLoc(p));
        
        // 模糊搜索
        const auto = new AMap.AutoComplete({ input: p + '-kw', city: '广东' });
        auto.on('select', (e) => {
            if(e.poi && e.poi.location) {
                maps[p].setCenter(e.poi.location);
                maps[p].clearMap();
                new AMap.Marker({ position: e.poi.location, map: maps[p] });
            }
        });
    });

    ds.search('广东省', (status, result) => {
        if(status === 'complete') {
            const list = result.districtList[0].districtList;
            fill('s-city', list); fill('e-city', list);
        }
    });
}

function fill(id, list) {
    const el = document.getElementById(id);
    const label = id.includes('city') ? '市' : (id.includes('dist') ? '区' : '镇');
    el.innerHTML = `<option value="">${label}</option>`;
    if(list) list.sort((a,b)=>a.name.localeCompare(b.name)).forEach(i => {
        el.innerHTML += `<option value="${i.name}">${i.name}</option>`;
    });
}

function subChange(p, val, level) {
    if(!val) return;
    ds.setLevel(level);
    ds.search(val, (status, result) => {
        if(status === 'complete') {
            const list = result.districtList[0].districtList;
            if(level === 'city') { fill(p+'-dist', list); fill(p+'-town', null); }
            else { fill(p+'-town', list); }
        }
        updateLoc(p);
    });
}

function updateLoc(p) {
    const city = document.getElementById(p+'-city').value;
    const dist = document.getElementById(p+'-dist').value;
    const town = document.getElementById(p+'-town').value;
    if(!city) return;
    
    // 手机端强制重绘地图，防止渲染失效
    maps[p].container.style.display = 'block'; 

    geo.getLocation(`广东省${city}${dist}${town}`, (st, res) => {
        if(st === 'complete' && res.geocodes.length) {
            const loc = res.geocodes[0].location;
            maps[p].setCenter(loc);
            maps[p].clearMap();
            new AMap.Marker({ position: loc, map: maps[p] });
        }
    });
}

function runRoute() {
    const getA = (p) => {
        const c = document.getElementById(p+'-city').value, d = document.getElementById(p+'-dist').value,
              t = document.getElementById(p+'-town').value, k = document.getElementById(p+'-kw').value;
        return `广东省${c}${d}${t}${k}`;
    };

    if(drv) drv.clear();
    drv = new AMap.Driving({ map: maps.main, policy: AMap.DrivingPolicy.LEAST_TIME });
    
    drv.search([{keyword: getA('s')}, {keyword: getA('e')}], (status, result) => {
        if (status === 'complete') {
            const r = result.routes[0];
            totalKM = parseFloat((r.distance / 1000).toFixed(1));
            totalPrice = (parseFloat(r.tolls || 0) + totalKM * 2.4).toFixed(1);
            calculate();
        } else { alert("路径规划失败，请精简地名"); }
    });
}

function chPax(n) { 
    paxCount = n; 
    document.getElementById('p3').className=n==3?'opt-btn active':'opt-btn'; 
    document.getElementById('p4').className=n==4?'opt-btn active':'opt-btn'; 
    document.getElementById('v4').style.visibility=n==3?'hidden':'visible'; 
    calculate(); 
}
function chMode(m) { 
    modeType = m; 
    document.getElementById('mS').className=m=='seg'?'opt-btn active':'opt-btn'; 
    document.getElementById('mA').className=m=='avg'?'opt-btn active':'opt-btn'; 
    calculate(); 
}

function calculate() {
    if(!totalKM) return;
    const rate = totalPrice / totalKM;
    let html = `<div class="res-line" style="color:var(--blue)"><span>全程 ${totalKM}km</span><b>￥${totalPrice}</b></div>`;
    
    if(modeType === 'avg') {
        const per = totalPrice / paxCount;
        for(let i=1; i<=paxCount; i++) html += `<div class="res-line"><span>客 ${i}</span><b>${per.toFixed(2)} 元</b></div>`;
    } else {
        let items = [];
        for(let i=1; i<=paxCount; i++) {
            let v = parseFloat(document.getElementById('v'+i).value) || 0;
            items.push({ id: i, dist: Math.min(v, totalKM) });
        }
        let sorted = [...items].sort((a,b) => a.dist - b.dist);
        let resMap = {}; items.forEach(x => resMap[x.id] = 0);
        let last = 0, count = paxCount;
        for (let i = 0; i < sorted.length; i++) {
            let seg = sorted[i].dist - last;
            if (seg > 0) {
                let cost = (seg * rate) / count;
                sorted.slice(i).forEach(x => resMap[x.id] += cost);
            }
            last = sorted[i].dist;
            count--;
        }
        items.forEach(x => { html += `<div class="res-line"><span>客 ${x.id}</span><b>${resMap[x.id].toFixed(2)} 元</b></div>`; });
    }
    document.getElementById('final-res').innerHTML = html;
}

window.onload = init;
</script>
</body>
</html>
