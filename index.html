<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>广东高速费分账-双级拨轮版 v58.0</title>
    
    <script type="text/javascript">
        window._AMapSecurityConfig = { securityJsCode: '17a5dd8e857eed4de7532d2c61b03872', }; 
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=1e1827b3250f2fc8380020d354978d39&plugin=AMap.Driving,AMap.DistrictSearch,AMap.AutoComplete,AMap.Geocoder,AMap.ToolBar"></script>

    <style>
        :root { --blue: #007AFF; --green: #34C759; --bg: #f2f2f7; --red: #FF3B30; --gray: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 14px; }
        
        #map-container { position: relative; width: 100%; height: 160px; border-radius: 16px; border: 1px solid #ccc; margin-bottom: 12px; overflow: hidden; background: #fff; }
        #main-map { width: 100%; height: 100%; }

        .panel { background: white; border-radius: 20px; padding: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 12px; }
        
        .loc-row { margin-bottom: 8px; border-bottom: 1px solid #f2f2f7; padding-bottom: 8px; }
        .sel-group { display: flex; gap: 4px; margin-bottom: 4px; }
        select { flex: 1; padding: 8px 2px; border: 1px solid #ddd; border-radius: 8px; font-size: 12px; background: #fafafa; }
        .kw-group { display: flex; gap: 6px; }
        .kw-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .btn-loc { padding: 0 10px; border: none; border-radius: 8px; color: white; background: var(--green); font-weight: bold; font-size: 12px; }

        .config-row { display: flex; gap: 8px; margin: 10px 0; }
        .opt-btn { flex: 1; padding: 10px; border: 1.5px solid #d1d1d6; border-radius: 10px; text-align: center; font-size: 13px; background: white; font-weight: bold; }
        .opt-btn.active { border-color: var(--blue); background: #f2f8ff; color: var(--blue); }

        /* 核心改进：双级里程选择布局 */
        .pax-container { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .pax-row { display: flex; align-items: center; gap: 8px; background: #f9f9f9; padding: 8px; border-radius: 10px; }
        .pax-label { width: 45px; font-size: 12px; font-weight: bold; color: #333; }
        .wheel-group { flex: 1; display: flex; gap: 4px; }
        .wheel-sel { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; background: #fff; text-align: center; }
        .wheel-unit { font-size: 12px; color: #999; width: 20px; }

        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 14px; color: white; font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        .bg-blue { background: var(--blue); }
        .bg-red { background: var(--red); box-shadow: 0 4px 10px rgba(255,59,48,0.2); }

        .res-box { padding: 12px; background: #fff; border-radius: 15px; border: 2px solid var(--blue); margin-top: 10px; min-height: 60px; }
        .res-line { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #eee; font-weight: bold; font-size: 15px; }
    </style>
</head>
<body>

<div id="map-container">
    <div id="main-map"></div>
</div>

<div class="panel">
    <div class="loc-row">
        <div class="sel-group"><select id="s-city"></select><select id="s-dist"></select><select id="s-town"></select></div>
        <div class="kw-group"><input type="text" id="s-kw" class="kw-input" placeholder="起点..."><button class="btn-loc" onclick="confirmPos('s')">定位</button></div>
    </div>
    <div class="loc-row">
        <div class="sel-group"><select id="e-city"></select><select id="e-dist"></select><select id="e-town"></select></div>
        <div class="kw-group"><input type="text" id="e-kw" class="kw-input" placeholder="终点..."><button class="btn-loc" onclick="confirmPos('e')">定位</button></div>
    </div>

    <div class="config-row">
        <div class="opt-btn" id="p3" onclick="chPax(3)">3人模式</div>
        <div class="opt-btn active" id="p4" onclick="chPax(4)">4人模式</div>
    </div>

    <div class="pax-container">
        <div class="pax-row">
            <div class="pax-label">客1:</div>
            <div class="wheel-group">
                <select id="v1_base" class="wheel-sel"></select>
                <select id="v1_unit" class="wheel-sel"></select>
            </div>
            <div class="wheel-unit">km</div>
        </div>
        <div class="pax-row">
            <div class="pax-label">客2:</div>
            <div class="wheel-group">
                <select id="v2_base" class="wheel-sel"></select>
                <select id="v2_unit" class="wheel-sel"></select>
            </div>
            <div class="wheel-unit">km</div>
        </div>
        <div class="pax-row">
            <div class="pax-label">客3:</div>
            <div class="wheel-group">
                <select id="v3_base" class="wheel-sel"></select>
                <select id="v3_unit" class="wheel-sel"></select>
            </div>
            <div class="wheel-unit">km</div>
        </div>
        <div id="row-v4" class="pax-row">
            <div class="pax-label">客4:</div>
            <div class="wheel-group">
                <select id="v4_base" class="wheel-sel"></select>
                <select id="v4_unit" class="wheel-sel"></select>
            </div>
            <div class="wheel-unit">km</div>
        </div>
    </div>

    <div class="config-row">
        <div class="opt-btn active" id="mS" onclick="chMode('seg')">按里程分段</div>
        <div class="opt-btn" id="mA" onclick="chMode('avg')">按人头平摊</div>
    </div>

    <button class="btn-action bg-blue" onclick="calculateRoute()">1. 获取高速过路费</button>
    <button class="btn-action bg-red" onclick="finalCalc()">2. 最终核算账单</button>

    <div id="final-res" class="res-box" style="text-align:center; color:#999;">请先执行上述两步</div>
</div>

<script>
let map, ds, geo, drv;
let totalKM = 0, totalTolls = 0, paxCount = 4, modeType = 'seg';
let markers = { s: null, e: null };

window.onload = function() {
    map = new AMap.Map('main-map', { zoom: 10 });
    map.addControl(new AMap.ToolBar({ position: 'RB' }));
    ds = new AMap.DistrictSearch({ subdistrict: 1 });
    geo = new AMap.Geocoder();

    // 初始化双级下拉框
    for(let i=1; i<=4; i++) {
        const base = document.getElementById(`v${i}_base`);
        const unit = document.getElementById(`v${i}_unit`);
        // 十位/百位 (0, 10, 20...290)
        for(let j=0; j<=300; j+=10) base.innerHTML += `<option value="${j}">${j}</option>`;
        // 个位 (0-9)
        for(let k=0; k<=9; k++) unit.innerHTML += `<option value="${k}">${k}</option>`;
    }

    ds.search('广东省', (status, res) => {
        if(status === 'complete') {
            const list = res.districtList[0].districtList;
            fill('s-city', list); fill('e-city', list);
        }
    });

    ['s','e'].forEach(p => {
        document.getElementById(p+'-city').onchange = (e) => loadNext(p, e.target.value, 'city');
        document.getElementById(p+'-dist').onchange = (e) => loadNext(p, e.target.value, 'district');
        const auto = new AMap.AutoComplete({ input: p + '-kw', city: '广东' });
        auto.on('select', (e) => { if(e.poi.location) setMarker(p, e.poi.location); });
    });
};

function fill(id, list) {
    const el = document.getElementById(id);
    el.innerHTML = `<option value="">${id.includes('city')?'市':(id.includes('dist')?'区':'镇')}</option>`;
    if(list) list.sort((a,b)=>a.name.localeCompare(b.name)).forEach(i => el.innerHTML += `<option value="${i.name}">${i.name}</option>`);
}

function loadNext(p, val, level) {
    if(!val) return;
    ds.setLevel(level);
    ds.search(val, (status, res) => {
        if(status === 'complete') {
            const list = res.districtList[0].districtList;
            if(level === 'city') { fill(p+'-dist', list); fill(p+'-town', null); }
            else { fill(p+'-town', list); }
        }
    });
}

function confirmPos(p) {
    const addr = `广东省${document.getElementById(p+'-city').value}${document.getElementById(p+'-dist').value}${document.getElementById(p+'-town').value}${document.getElementById(p+'-kw').value}`;
    geo.getLocation(addr, (status, result) => {
        if (status === 'complete' && result.geocodes.length) setMarker(p, result.geocodes[0].location);
    });
}

function setMarker(p, loc) {
    if(markers[p]) map.remove(markers[p]);
    markers[p] = new AMap.Marker({ position: loc, label: { content: p==='s'?'起':'终', direction:'top' }});
    map.add(markers[p]);
    map.setFitView();
}

function calculateRoute() {
    if(!markers.s || !markers.e) return alert("请先完成定位！");
    if(drv) drv.clear();
    drv = new AMap.Driving({ map: map, policy: 4 });
    drv.search(markers.s.getPosition(), markers.e.getPosition(), (status, result) => {
        if (status === 'complete') {
            const r = result.routes[0];
            totalKM = parseFloat((r.distance / 1000).toFixed(1));
            totalTolls = parseFloat(r.tolls || 0).toFixed(2);
            alert(`✅ 获取成功！全程 ${totalKM}km，高速费总额 ￥${totalTolls}`);
        } else { alert("获取失败"); }
    });
}

function chPax(n) { 
    paxCount = n; 
    document.getElementById('p3').className=n==3?'opt-btn active':'opt-btn'; 
    document.getElementById('p4').className=n==4?'opt-btn active':'opt-btn'; 
    document.getElementById('row-v4').style.display=n==3?'none':'flex'; 
}

function chMode(m) { 
    modeType = m; 
    document.getElementById('mS').className=m=='seg'?'opt-btn active':'opt-btn'; 
    document.getElementById('mA').className=m=='avg'?'opt-btn active':'opt-btn'; 
}

function finalCalc() {
    if(!totalKM) return alert("请先点击蓝色按钮获取路费数据！");
    const rate = totalTolls / totalKM;
    let html = `<div class="res-line" style="color:var(--blue)"><span>总里程 ${totalKM}km</span><span>路费 ￥${totalTolls}</span></div>`;
    
    if(modeType === 'avg') {
        const per = totalTolls / paxCount;
        for(let i=1; i<=paxCount; i++) html += `<div class="res-line"><span>客 ${i} 分摊</span><b>${per.toFixed(2)} 元</b></div>`;
    } else {
        let items = [];
        for(let i=1; i<=paxCount; i++) {
            const b = parseFloat(document.getElementById(`v${i}_base`).value);
            const u = parseFloat(document.getElementById(`v${i}_unit`).value);
            let v = b + u;
            items.push({ id: i, dist: Math.min(v, totalKM) });
        }
        let sorted = [...items].sort((a,b) => a.dist - b.dist);
        let resMap = {}; items.forEach(x => resMap[x.id] = 0);
        let last = 0, count = paxCount;
        for (let i = 0; i < sorted.length; i++) {
            let seg = sorted[i].dist - last;
            if (seg > 0) {
                let cost = (seg * rate) / count;
                sorted.slice(i).forEach(x => resMap[x.id] += cost);
            }
            last = sorted[i].dist;
            count--;
        }
        items.forEach(x => html += `<div class="res-line"><span>客 ${x.id} (${x.dist}km)</span><b>${resMap[x.id].toFixed(2)} 元</b></div>`);
    }
    document.getElementById('final-res').innerHTML = html;
}
</script>
</body>
</html>
