<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>广东三图联动计费 v43.0</title>
    
    <script type="text/javascript">
        window._AMapSecurityConfig = { securityJsCode: 'b559741e31149204588581114b731b79', }; 
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=d40b46f59c6ac01013fb25c663857fff&plugin=AMap.Driving,AMap.DistrictSearch,AMap.AutoComplete,AMap.PlaceSearch"></script>

    <style>
        :root { --amap-blue: #007AFF; --ios-bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: var(--ios-bg); margin: 0; padding: 8px; }
        .container { max-width: 600px; margin: auto; }

        /* 地图布局 */
        .map-section { margin-bottom: 10px; }
        #main-map { width: 100%; height: 160px; border-radius: 15px; border: 1px solid #ccc; margin-bottom: 6px; }
        .sub-maps { display: flex; gap: 6px; height: 100px; }
        .sub-map-item { flex: 1; border-radius: 10px; border: 1px solid #ddd; overflow: hidden; position: relative; }
        .sub-map-label { position: absolute; top: 0; left: 0; background: rgba(0,0,0,0.5); color: #fff; font-size: 10px; padding: 2px 5px; z-index: 10; border-bottom-right-radius: 5px; }

        .panel { background: white; border-radius: 20px; padding: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .select-group { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
        .cascader-row { display: flex; gap: 4px; margin-bottom: 6px; }
        select { flex: 1; min-width: 0; padding: 8px 2px; border: 1px solid #e5e5ea; border-radius: 8px; font-size: 12px; background: #f9f9fb; outline: none; }
        
        .input-wrap { position: relative; }
        .detail-input { width: 100%; padding: 10px; border: 1px solid #e5e5ea; border-radius: 8px; font-size: 13px; box-sizing: border-box; }

        .btn-run { width: 100%; padding: 15px; border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 16px; background: var(--amap-blue); cursor: pointer; margin-top: 5px; }
        .res-panel { margin-top: 10px; padding: 12px; background: #fff; border-radius: 12px; border: 2px solid var(--amap-blue); }
        .res-line { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #eee; font-size: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="map-section">
        <div id="main-map"></div>
        <div class="sub-maps">
            <div class="sub-map-item"><span class="sub-map-label">起点预览</span><div id="s-map" style="height:100%"></div></div>
            <div class="sub-map-item"><span class="sub-map-label">终点预览</span><div id="e-map" style="height:100%"></div></div>
        </div>
    </div>

    <div class="panel">
        <div class="select-group">
            <div class="cascader-row">
                <select id="s-city" onchange="loadSub('s', this.value, 'city')"><option>市</option></select>
                <select id="s-dist" onchange="loadSub('s', this.value, 'district')"><option>区</option></select>
                <select id="s-street" onchange="updateSubMap('s')"><option>镇/街</option></select>
            </div>
            <div class="input-wrap"><input type="text" id="s-detail" class="detail-input" placeholder="输入起点详细位置..."></div>
        </div>

        <div class="select-group">
            <div class="cascader-row">
                <select id="e-city" onchange="loadSub('e', this.value, 'city')"><option>市</option></select>
                <select id="e-dist" onchange="loadSub('e', this.value, 'district')"><option>区</option></select>
                <select id="e-street" onchange="updateSubMap('e')"><option>镇/街</option></select>
            </div>
            <div class="input-wrap"><input type="text" id="e-detail" class="detail-input" placeholder="输入终点详细位置..."></div>
        </div>
        
        <button class="btn-run" onclick="planBest()">🔍 计算费用</button>
        <div class="res-panel" id="final-res" style="text-align:center; color:#999;">等待输入...</div>
    </div>
</div>

<script>
let mainMap, sMap, eMap, districtSearch, driving, autoS, autoE;
let totalKM = 0, totalPrice = 0;

function init() {
    mainMap = new AMap.Map('main-map', { zoom: 10 });
    sMap = new AMap.Map('s-map', { zoom: 13, zoomEnable: false });
    eMap = new AMap.Map('e-map', { zoom: 13, zoomEnable: false });

    districtSearch = new AMap.DistrictSearch({ subdistrict: 1, showbiz: false });
    districtSearch.search('广东省', (status, result) => {
        if(status === 'complete') {
            const list = result.districtList[0].districtList;
            fill('s-city', list, "市"); fill('e-city', list, "市");
        }
    });

    // 初始化模糊搜索提示
    setupAuto('s'); setupAuto('e');
}

function setupAuto(prefix) {
    const inputId = prefix + '-detail';
    const auto = new AMap.AutoComplete({ input: inputId, city: '广东', citylimit: true });
    auto.on('select', (e) => {
        if(e.poi && e.poi.location) {
            const map = prefix === 's' ? sMap : eMap;
            map.setCenter(e.poi.location);
            new AMap.Marker({ position: e.poi.location, map: map });
        }
    });
}

function fill(id, list, defaultText) {
    const el = document.getElementById(id);
    el.innerHTML = `<option value="">${defaultText}</option>`;
    if(!list) return;
    list.sort((a,b)=>a.name.localeCompare(b.name, 'zh')).forEach(item => {
        el.innerHTML += `<option value="${item.name}">${item.name}</option>`;
    });
}

function loadSub(prefix, name, level) {
    if(!name) return;
    districtSearch.setLevel(level);
    districtSearch.search(name, (status, result) => {
        if(status === 'complete' && result.districtList[0].districtList) {
            fill(prefix + '-' + (level==='city'?'dist':'street'), result.districtList[0].districtList, level==='city'?'区':'镇/街');
        }
        updateSubMap(prefix); // 切换级别时刷新预览图
    });
}

// 刷新小地图定位
function updateSubMap(prefix) {
    const city = document.getElementById(prefix+'-city').value;
    const dist = document.getElementById(prefix+'-dist').value;
    const street = document.getElementById(prefix+'-street').value;
    const addr = `广东省${city}${dist}${street}`;
    
    const geocoder = new AMap.Geocoder();
    geocoder.getLocation(addr, (status, result) => {
        if (status === 'complete' && result.geocodes.length) {
            const map = prefix === 's' ? sMap : eMap;
            map.setCenter(result.geocodes[0].location);
            map.clearMap();
            new AMap.Marker({ position: result.geocodes[0].location, map: map });
        }
    });
}

function planBest() {
    const get = (id) => document.getElementById(id).value;
    const sAddr = `广东省${get('s-city')}${get('s-dist')}${get('s-street')}${get('s-detail')}`;
    const eAddr = `广东省${get('e-city')}${get('e-dist')}${get('e-street')}${get('e-detail')}`;

    if(driving) driving.clear();
    driving = new AMap.Driving({ map: mainMap, policy: AMap.DrivingPolicy.LEAST_TIME });
    driving.search([{keyword: sAddr}, {keyword: eAddr}], (status, result) => {
        if (status === 'complete') {
            const route = result.routes[0];
            totalKM = (route.distance / 1000).toFixed(1);
            totalPrice = (parseFloat(route.tolls || 0) + totalKM * 2.4).toFixed(1);
            document.getElementById('final-res').innerHTML = `
                <div class="res-line"><span>全程里程</span><b>${totalKM} km</b></div>
                <div class="res-line"><span>高速路费</span><b>${route.tolls || 0} 元</b></div>
                <div class="res-line" style="color:red"><span>预估总计</span><b>￥${totalPrice}</b></div>
            `;
        }
    });
}

// 需要引入 Geocoder 插件
</script>
<script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=d40b46f59c6ac01013fb25c663857fff&plugin=AMap.Driving,AMap.DistrictSearch,AMap.AutoComplete,AMap.Geocoder"></script>
</body>
</html>
