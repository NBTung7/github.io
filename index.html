<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autocomplete Search</title>
    <script src="https://webapi.amap.com/maps?v=1.4.15&key=YOUR_API_KEY"></script>
</head>
<body>
    <h1>Search for Departure and Destination</h1>
    <form>
        <label for="departure">Departure:</label>
        <input type="text" id="departure" name="departure" autocomplete="on">

        <label for="destination">Destination:</label>
        <input type="text" id="destination" name="destination" autocomplete="on">

        <input type="submit" value="Search">
    </form>

    <script>
        const departureInput = document.getElementById('departure');
        const destinationInput = document.getElementById('destination');

        // Initialize Amap Autocomplete
        const autoComplete = new AMap.Autocomplete({
            input: 'departure'
        });
        const autoCompleteDest = new AMap.Autocomplete({
            input: 'destination'
        });
    </script>
</body>
</html>
