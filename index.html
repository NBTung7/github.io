<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>广东四级直排计费 v40.0</title>
    
    <script type="text/javascript">
        window._AMapSecurityConfig = { securityJsCode: 'b559741e31149204588581114b731b79', }; 
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=d40b46f59c6ac01013fb25c663857fff&plugin=AMap.Driving,AMap.DistrictSearch"></script>

    <style>
        :root { --amap-blue: #007AFF; --ios-bg: #f2f2f7; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: var(--ios-bg); margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; }

        /* 地图高度稍微缩小，腾出空间给四级菜单 */
        .map-wrap { width: 100%; height: 160px; border-radius: 18px; overflow: hidden; border: 1px solid #d1d1d6; margin-bottom: 10px; }
        #amap-box { width: 100%; height: 100%; }

        .panel { background: white; border-radius: 24px; padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        .select-group { margin-bottom: 15px; background: #f9f9fb; padding: 12px; border-radius: 14px; border: 1px solid #e5e5ea; }
        .select-title { font-size: 12px; color: #8e8e93; margin-bottom: 8px; font-weight: bold; display: block; }
        
        /* 单列垂直布局 */
        .cascader { display: flex; flex-direction: column; gap: 6px; }
        select { width: 100%; padding: 12px 8px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; background: white; -webkit-appearance: none; }

        .btn-run { width: 100%; padding: 16px; border: none; border-radius: 14px; color: white; font-weight: bold; font-size: 17px; background: var(--amap-blue); cursor: pointer; margin-bottom: 15px; }

        .best-route-info { background: #f2f8ff; padding: 15px; border-radius: 14px; border: 1.5px solid #d0e7ff; margin-bottom: 15px; display: none; text-align: center; }
        .best-route-info div { display: flex; justify-content: space-around; }
        .info-item { display: flex; flex-direction: column; gap: 4px; }
        .info-label { font-size: 11px; color: #7a9cb5; }
        .info-val { font-size: 18px; font-weight: bold; }

        .opt-row { display: flex; gap: 6px; margin-bottom: 8px; }
        .opt-btn { flex: 1; padding: 12px; border: 1.5px solid #d1d1d6; border-radius: 10px; text-align: center; font-size: 13px; background: white; font-weight: bold; }
        .opt-btn.active { border-color: var(--amap-blue); background: #f2f8ff; color: var(--amap-blue); }
        
        #pax-inputs input { margin-bottom: 8px; border-radius: 10px; border: 1px solid #eee; padding: 12px; width: 100%; box-sizing: border-box; font-size: 15px; }
        .res-panel { margin-top: 10px; padding: 15px; background: #fff; border-radius: 15px; border: 2px solid var(--amap-blue); min-height: 50px; }
        .res-line { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; font-size: 17px; font-weight: bold; color: #003e7e; }
    </style>
</head>
<body>

<div class="container">
    <div class="map-wrap"><div id="amap-box"></div></div>

    <div class="panel">
        <div class="select-group">
            <span class="select-title">📍 起点 (广东省内)</span>
            <div class="cascader">
                <select id="s-city" onchange="loadSub('s', this.value, 'city')"><option>选择地级市</option></select>
                <select id="s-dist" onchange="loadSub('s', this.value, 'district')"><option>选择区县</option></select>
                <select id="s-street" onchange="loadSub('s', this.value, 'street')"><option>选择镇/街道</option></select>
                <select id="s-village"><option value="">选择村/社区(可选)</option></select>
            </div>
        </div>

        <div class="select-group">
            <span class="select-title">🏁 终点 (广东省内)</span>
            <div class="cascader">
                <select id="e-city" onchange="loadSub('e', this.value, 'city')"><option>选择地级市</option></select>
                <select id="e-dist" onchange="loadSub('e', this.value, 'district')"><option>选择区县</option></select>
                <select id="e-street" onchange="loadSub('e', this.value, 'street')"><option>选择镇/街道</option></select>
                <select id="e-village"><option value="">选择村/社区(可选)</option></select>
            </div>
        </div>
        
        <button class="btn-run" onclick="planBest()">🔍 开始计算行程费用</button>

        <div id="routeInfo" class="best-route-info">
            <div>
                <div class="info-item"><span class="info-label">全程里程</span><span class="info-val"><span id="r-dist">0</span> km</span></div>
                <div class="info-item"><span class="info-label">高速路费</span><span class="info-val"><span id="r-toll">0</span> 元</span></div>
            </div>
        </div>

        <div class="opt-row">
            <div class="opt-btn" id="p3" onclick="chPax(3)">3人</div>
            <div class="opt-btn active" id="p4" onclick="chPax(4)">4人</div>
            <div class="opt-btn active" id="mS" onclick="chMode('seg')">分段</div>
            <div class="opt-btn" id="mA" onclick="chMode('avg')">平摊</div>
        </div>

        <div id="pax-inputs">
            <input type="number" id="v1" placeholder="乘客1下车公里数" oninput="calculate()">
            <input type="number" id="v2" placeholder="乘客2下车公里数" oninput="calculate()">
            <input type="number" id="v3" placeholder="乘客3下车公里数" oninput="calculate()">
            <input type="number" id="v4" placeholder="乘客4下车公里数" oninput="calculate()">
        </div>

        <div class="res-panel"><div id="final-res" style="text-align:center;color:#999;">等待输入数据...</div></div>
    </div>
</div>

<script>
let aMap, districtSearch, totalKM = 0, totalPrice = 0, paxCount = 4, modeType = 'seg', driving = null;

function init() {
    aMap = new AMap.Map('amap-box', { zoom: 10 });
    districtSearch = new AMap.DistrictSearch({ subdistrict: 1, showbiz: false });
    districtSearch.search('广东省', (status, result) => {
        if(status === 'complete') {
            const list = result.districtList[0].districtList;
            fill('s-city', list, "选择地级市"); fill('e-city', list, "选择地级市");
        }
    });
}

function fill(id, list, defaultText) {
    const el = document.getElementById(id);
    el.innerHTML = `<option value="">${defaultText}</option>`;
    if(!list) return;
    list.sort((a,b)=>a.name.localeCompare(b.name, 'zh')).forEach(item => {
        el.innerHTML += `<option value="${item.name}">${item.name}</option>`;
    });
}

function loadSub(prefix, name, level) {
    if(!name) return;
    const nextConfig = { 'city': { id: 'dist', txt: '选择区县' }, 'district': { id: 'street', txt: '选择镇/街道' }, 'street': { id: 'village', txt: '选择村/社区(可选)' } };
    const config = nextConfig[level];
    
    districtSearch.setLevel(level);
    districtSearch.search(name, (status, result) => {
        if(status === 'complete' && result.districtList[0].districtList) {
            fill(prefix + '-' + config.id, result.districtList[0].districtList, config.txt);
            // 联动清空
            if(level === 'city') { fill(prefix + '-street', null, '选择镇/街道'); fill(prefix + '-village', null, '选择村/社区(可选)'); }
            if(level === 'district') { fill(prefix + '-village', null, '选择村/社区(可选)'); }
        }
    });
}

function planBest() {
    const get = (id) => document.getElementById(id).value;
    const s = `广东省${get('s-city')}${get('s-dist')}${get('s-street')}${get('s-village')}`;
    const e = `广东省${get('e-city')}${get('e-dist')}${get('e-street')}${get('e-village')}`;
    if(!get('s-dist') || !get('e-dist')) return alert("请至少选到区县");

    if(driving) driving.clear();
    driving = new AMap.Driving({ map: aMap, policy: AMap.DrivingPolicy.LEAST_TIME });
    driving.search([{keyword: s}, {keyword: e}], (status, result) => {
        if (status === 'complete') {
            const route = result.routes[0];
            totalKM = parseFloat((route.distance / 1000).toFixed(1));
            const toll = parseFloat(route.tolls || 0);
            totalPrice = toll + (totalKM * 2.4);
            document.getElementById('routeInfo').style.display = 'block';
            document.getElementById('r-dist').innerText = totalKM;
            document.getElementById('r-toll').innerText = toll;
            calculate();
        }
    });
}

function chPax(n) { paxCount = n; document.getElementById('p3').className=n==3?'opt-btn active':'opt-btn'; document.getElementById('p4').className=n==4?'opt-btn active':'opt-btn'; document.getElementById('v4').style.display=n==3?'none':'block'; calculate(); }
function chMode(m) { modeType = m; document.getElementById('mS').className=m=='seg'?'opt-btn active':'opt-btn'; document.getElementById('mA').className=m=='avg'?'opt-btn active':'opt-btn'; document.getElementById('pax-inputs').style.display=m=='avg'?'none':'block'; calculate(); }

function calculate() {
    if(!totalKM || !totalPrice) return;
    const rate = totalPrice / totalKM;
    let html = "";
    if(modeType === 'avg') {
        const per = totalPrice / paxCount;
        for(let i=1; i<=paxCount; i++) html += `<div class="res-line"><span>乘客 ${i}</span><b>${per.toFixed(2)} 元</b></div>`;
    } else {
        let items = [];
        for(let i=1; i<=paxCount; i++) {
            let v = parseFloat(document.getElementById('v'+i).value) || 0;
            items.push({ id: i, dist: Math.min(v, totalKM) });
        }
        let sorted = [...items].sort((a,b) => a.dist - b.dist);
        let resMap = {}; items.forEach(x => resMap[x.id] = 0);
        let last = 0, count = paxCount;
        for (let i = 0; i < sorted.length; i++) {
            let seg = sorted[i].dist - last;
            if (seg > 0) {
                let cost = (seg * rate) / count;
                sorted.slice(i).forEach(x => resMap[x.id] += cost);
            }
            last = sorted[i].dist;
            count--;
        }
        items.forEach(x => { html += `<div class="res-line"><span>乘客 ${x.id}</span><b>${resMap[x.id].toFixed(2)} 元</b></div>`; });
    }
    document.getElementById('final-res').innerHTML = html;
}
window.onload = init;
</script>
</body>
</html>
