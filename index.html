<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能拼车结算系统 (含自动定位)</title>
    
    <script type="text/javascript">
        window._AMapSecurityConfig = { securityJsCode: 'b559741e31149204588581114b731b79', }; 
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=d40b46f59c6ac01013fb25c663857fff&plugin=AMap.Driving"></script>
    <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=LPi70Nil8yxoR7RqrBL8ZDVFXJvwP7U7"></script>

    <style>
        /* 样式保持 13.0 版本一致，增加一个定位状态显示 */
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; }
        .map-engine-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .map-box { flex: 1; height: 180px; border-radius: 12px; border: 1px solid #ddd; position: relative; overflow: hidden; }
        .map-label { position: absolute; top: 5px; left: 5px; z-index: 99; background: rgba(255,255,255,0.8); padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .card { background: white; border-radius: 20px; padding: 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        h2 { text-align: center; margin: 0 0 15px 0; font-size: 18px; }
        .input-row { display: flex; gap: 5px; margin-bottom: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        .engine-btns { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-go { flex: 1; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .bg-amap { background: #007AFF; }
        .bg-baidu { background: #E60012; }
        .loc-status { font-size: 11px; text-align: center; color: #666; margin-bottom: 10px; }
        /* 结算逻辑样式省略，保持之前的分段/人数样式... */
        .btn-group { display: flex; gap: 5px; margin-bottom: 8px; }
        .opt-btn { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; text-align: center; cursor: pointer; background: white; font-size: 13px; }
        .opt-btn.active { border-color: #007AFF; background: #eef6ff; color: #007AFF; }
        .result-box { margin-top: 15px; padding: 15px; background: #f0f9ff; border-radius: 12px; border: 1px solid #bae1ff; }
        .res-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #cce5ff; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <div class="map-engine-row">
        <div class="map-box" id="amap-container"><div class="map-label">高德引擎</div></div>
        <div class="map-box" id="baidu-container"><div class="map-label">百度引擎</div></div>
    </div>

    <div class="card">
        <h2>🚗 智能结算 (自动定位版)</h2>
        
        <div id="locStatus" class="loc-status">正在尝试自动定位起点...</div>

        <div class="input-row">
            <input type="text" id="startLoc" placeholder="📍 起点 (定位成功后自动填入)">
            <input type="text" id="endLoc" placeholder="🏁 输入终点">
        </div>
        
        <div class="engine-btns">
            <button class="btn-go bg-amap" onclick="callAmap()">高德规划</button>
            <button class="btn-go bg-baidu" onclick="callBaidu()">百度规划</button>
        </div>

        <div id="calcArea">
            </div>
        </div>
</div>

<script>
let aMap, bMap, aDriving, bDriving;
// 初始化地图
function initMaps() {
    aMap = new AMap.Map('amap-container', { zoom: 12 });
    aDriving = new AMap.Driving({ map: aMap, policy: AMap.DrivingPolicy.LEAST_DISTANCE });
    
    bMap = new BMap.Map("baidu-container");
    bMap.centerAndZoom(new BMap.Point(113.27, 23.13), 12);
    bDriving = new BMap.DrivingRoute(bMap, { renderOptions: {map: bMap, autoViewport: true} });

    // 页面加载完成后立即尝试获取定位
    askLocation();
}

// 核心：请求定位权限
function askLocation() {
    const statusDiv = document.getElementById('locStatus');
    
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                
                // 使用高德逆地理编码将坐标转为地名
                AMap.plugin('AMap.Geocoder', function() {
                    const geocoder = new AMap.Geocoder();
                    geocoder.getAddress([lng, lat], function(status, result) {
                        if (status === 'complete' && result.regeocode) {
                            const address = result.regeocode.formattedAddress;
                            document.getElementById('startLoc').value = address;
                            statusDiv.innerHTML = "✅ 定位成功：已自动设为起点";
                            statusDiv.style.color = "#28a745";
                        }
                    });
                });
            },
            (error) => {
                console.error(error);
                statusDiv.innerHTML = "❌ 定位失败 (请检查手机定位开关或浏览器权限)";
                statusDiv.style.color = "#dc3545";
            },
            { enableHighAccuracy: true, timeout: 5000 }
        );
    } else {
        statusDiv.innerHTML = "⚠️ 您的浏览器不支持定位";
    }
}

// 规划逻辑与 13.0 一致...
function callAmap() { /* ... */ }
function callBaidu() { /* ... */ }

window.onload = initMaps;
</script>
</body>
</html>
