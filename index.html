<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>广东混合定位计费 v42.0</title>
    
    <script type="text/javascript">
        window._AMapSecurityConfig = { securityJsCode: 'b559741e31149204588581114b731b79', }; 
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=d40b46f59c6ac01013fb25c663857fff&plugin=AMap.Driving,AMap.DistrictSearch"></script>

    <style>
        :root { --amap-blue: #007AFF; --ios-bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: var(--ios-bg); margin: 0; padding: 8px; }
        .container { max-width: 600px; margin: auto; }

        .map-wrap { width: 100%; height: 160px; border-radius: 15px; overflow: hidden; border: 1px solid #d1d1d6; margin-bottom: 8px; }
        #amap-box { width: 100%; height: 100%; }

        .panel { background: white; border-radius: 20px; padding: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .select-group { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
        .select-title { font-size: 11px; color: #888; margin-bottom: 6px; font-weight: bold; display: block; }
        
        /* 混合布局：前三个下拉框横排，下方一个宽输入框 */
        .cascader-row { display: flex; gap: 4px; margin-bottom: 6px; }
        select { flex: 1; min-width: 0; padding: 8px 2px; border: 1px solid #e5e5ea; border-radius: 8px; font-size: 12px; background: #f9f9fb; outline: none; }
        
        .detail-input { width: 100%; padding: 10px; border: 1px solid #e5e5ea; border-radius: 8px; font-size: 13px; box-sizing: border-box; background: #fff; outline: none; }
        .detail-input:focus { border-color: var(--amap-blue); }

        .btn-run { width: 100%; padding: 15px; border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 16px; background: var(--amap-blue); cursor: pointer; margin-top: 5px; }

        .best-route-info { background: #f2f8ff; padding: 12px; border-radius: 12px; border: 1px solid #d0e7ff; margin: 10px 0; display: none; }
        .best-route-info div { display: flex; justify-content: space-around; }
        .info-item { display: flex; flex-direction: column; align-items: center; }
        .info-label { font-size: 10px; color: #7a9cb5; }
        .info-val { font-size: 16px; font-weight: bold; }

        .opt-row { display: flex; gap: 4px; margin-bottom: 8px; }
        .opt-btn { flex: 1; padding: 10px; border: 1px solid #d1d1d6; border-radius: 8px; text-align: center; font-size: 12px; background: white; font-weight: bold; }
        .opt-btn.active { border-color: var(--amap-blue); background: #f2f8ff; color: var(--amap-blue); }
        
        #pax-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        #pax-inputs input { border-radius: 8px; border: 1px solid #eee; padding: 10px; width: 100%; box-sizing: border-box; font-size: 13px; }
        
        .res-panel { margin-top: 10px; padding: 12px; background: #fff; border-radius: 12px; border: 2px solid var(--amap-blue); }
        .res-line { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #eee; font-size: 15px; font-weight: bold; color: #003e7e; }
    </style>
</head>
<body>

<div class="container">
    <div class="map-wrap"><div id="amap-box"></div></div>

    <div class="panel">
        <div class="select-group">
            <span class="select-title">📍 起点设置</span>
            <div class="cascader-row">
                <select id="s-city" onchange="loadSub('s', this.value, 'city')"><option>市</option></select>
                <select id="s-dist" onchange="loadSub('s', this.value, 'district')"><option>区</option></select>
                <select id="s-street"><option>镇/街</option></select>
            </div>
            <input type="text" id="s-detail" class="detail-input" placeholder="输入具体路名、大厦或档口名...">
        </div>

        <div class="select-group">
            <span class="select-title">🏁 终点设置</span>
            <div class="cascader-row">
                <select id="e-city" onchange="loadSub('e', this.value, 'city')"><option>市</option></select>
                <select id="e-dist" onchange="loadSub('e', this.value, 'district')"><option>区</option></select>
                <select id="e-street"><option>镇/街</option></select>
            </div>
            <input type="text" id="e-detail" class="detail-input" placeholder="输入具体路名、大厦或目的地...">
        </div>
        
        <button class="btn-run" onclick="planBest()">🔍 获取路线及费用</button>

        <div id="routeInfo" class="best-route-info">
            <div>
                <div class="info-item"><span class="info-label">里程</span><span class="info-val"><span id="r-dist">0</span> km</span></div>
                <div class="info-item"><span class="info-label">路费</span><span class="info-val"><span id="r-toll">0</span> 元</span></div>
            </div>
        </div>

        <div class="opt-row">
            <div class="opt-btn" id="p3" onclick="chPax(3)">3人</div>
            <div class="opt-btn active" id="p4" onclick="chPax(4)">4人</div>
            <div class="opt-btn active" id="mS" onclick="chMode('seg')">分段</div>
            <div class="opt-btn" id="mA" onclick="chMode('avg')">平摊</div>
        </div>

        <div id="pax-inputs">
            <input type="number" id="v1" placeholder="客1km" oninput="calculate()">
            <input type="number" id="v2" placeholder="客2km" oninput="calculate()">
            <input type="number" id="v3" placeholder="客3km" oninput="calculate()">
            <input type="number" id="v4" placeholder="客4km" oninput="calculate()">
        </div>

        <div class="res-panel"><div id="final-res" style="text-align:center;color:#999;font-size:12px;">计算结果</div></div>
    </div>
</div>

<script>
let aMap, districtSearch, totalKM = 0, totalPrice = 0, paxCount = 4, modeType = 'seg', driving = null;

function init() {
    aMap = new AMap.Map('amap-box', { zoom: 10 });
    districtSearch = new AMap.DistrictSearch({ subdistrict: 1, showbiz: false });
    districtSearch.search('广东省', (status, result) => {
        if(status === 'complete') {
            const list = result.districtList[0].districtList;
            fill('s-city', list, "市"); fill('e-city', list, "市");
        }
    });
}

function fill(id, list, defaultText) {
    const el = document.getElementById(id);
    el.innerHTML = `<option value="">${defaultText}</option>`;
    if(!list) return;
    list.sort((a,b)=>a.name.localeCompare(b.name, 'zh')).forEach(item => {
        el.innerHTML += `<option value="${item.name}">${item.name}</option>`;
    });
}

function loadSub(prefix, name, level) {
    if(!name) return;
    const nextConfig = { 'city': { id: 'dist', txt: '区' }, 'district': { id: 'street', txt: '镇/街' } };
    const config = nextConfig[level];
    districtSearch.setLevel(level);
    districtSearch.search(name, (status, result) => {
        if(status === 'complete' && result.districtList[0].districtList) {
            fill(prefix + '-' + config.id, result.districtList[0].districtList, config.txt);
            if(level === 'city') fill(prefix + '-street', null, '镇/街');
        }
    });
}

function planBest() {
    const get = (id) => document.getElementById(id).value;
    // 自动合并地址
    const startStr = `广东省${get('s-city')}${get('s-dist')}${get('s-street')}${get('s-detail')}`;
    const endStr = `广东省${get('e-city')}${get('e-dist')}${get('e-street')}${get('e-detail')}`;

    if(!get('s-dist') || !get('e-dist')) return alert("请至少选到区县");

    if(driving) driving.clear();
    driving = new AMap.Driving({ map: aMap, policy: AMap.DrivingPolicy.LEAST_TIME });
    driving.search([{keyword: startStr}, {keyword: endStr}], (status, result) => {
        if (status === 'complete') {
            const route = result.routes[0];
            totalKM = parseFloat((route.distance / 1000).toFixed(1));
            const toll = parseFloat(route.tolls || 0);
            totalPrice = toll + (totalKM * 2.4);
            document.getElementById('routeInfo').style.display = 'block';
            document.getElementById('r-dist').innerText = totalKM;
            document.getElementById('r-toll').innerText = toll;
            calculate();
        } else {
            alert("未找到具体位置，请尝试精简输入内容");
        }
    });
}

// 乘客计算逻辑保持一致
function chPax(n) { paxCount = n; document.getElementById('p3').className=n==3?'opt-btn active':'opt-btn'; document.getElementById('p4').className=n==4?'opt-btn active':'opt-btn'; document.getElementById('v4').style.visibility=n==3?'hidden':'visible'; calculate(); }
function chMode(m) { modeType = m; document.getElementById('mS').className=m=='seg'?'opt-btn active':'opt-btn'; document.getElementById('mA').className=m=='avg'?'opt-btn active':'opt-btn'; calculate(); }

function calculate() {
    if(!totalKM || !totalPrice) return;
    const rate = totalPrice / totalKM;
    let html = "";
    if(modeType === 'avg') {
        const per = totalPrice / paxCount;
        for(let i=1; i<=paxCount; i++) html += `<div class="res-line"><span>客 ${i}</span><b>${per.toFixed(2)} 元</b></div>`;
    } else {
        let items = [];
        for(let i=1; i<=paxCount; i++) {
            let v = parseFloat(document.getElementById('v'+i).value) || 0;
            items.push({ id: i, dist: Math.min(v, totalKM) });
        }
        let sorted = [...items].sort((a,b) => a.dist - b.dist);
        let resMap = {}; items.forEach(x => resMap[x.id] = 0);
        let last = 0, count = paxCount;
        for (let i = 0; i < sorted.length; i++) {
            let seg = sorted[i].dist - last;
            if (seg > 0) {
                let cost = (seg * rate) / count;
                sorted.slice(i).forEach(x => resMap[x.id] += cost);
            }
            last = sorted[i].dist;
            count--;
        }
        items.forEach(x => { html += `<div class="res-line"><span>客 ${x.id}</span><b>${resMap[x.id].toFixed(2)} 元</b></div>`; });
    }
    document.getElementById('final-res').innerHTML = html;
}
window.onload = init;
</script>
</body>
</html>
