<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高速费分段结算</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; padding: 15px; color: #333; margin: 0; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: 20px auto; }
        h2 { text-align: center; margin-top: 0; color: #007AFF; font-size: 18px; }
        
        .section-title { font-size: 13px; font-weight: bold; color: #999; margin: 15px 0 8px 0; border-left: 3px solid #007AFF; padding-left: 8px; }
        input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; background: #fafafa; margin-bottom: 10px; outline: none; }
        
        .btn-group { display: flex; gap: 8px; margin-bottom: 5px; }
        .option-btn { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 10px; text-align: center; cursor: pointer; background: white; font-weight: bold; font-size: 14px; }
        .option-btn.active { border-color: #007AFF; background: #eef6ff; color: #007AFF; }

        .result-box { margin-top: 15px; padding: 12px; background: #f0f9ff; border-radius: 12px; border: 1px solid #bae1ff; }
        .res-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #cce5ff; font-size: 16px; }
        .res-item:last-child { border-bottom: none; }
        .res-item b { color: #007AFF; }
        .total-info { font-size: 12px; color: #888; margin-top: 10px; text-align: center; }
        
        .reset-link { display: block; text-align: center; margin-top: 15px; font-size: 13px; color: #999; text-decoration: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚗 乘客分摊计算</h2>
    
    <div class="section-title">全程总里程 (km)</div>
    <input type="number" id="totalDist" placeholder="输入高速总里程" oninput="calc()">

    <div class="section-title">费率标准</div>
    <div class="btn-group">
        <div class="option-btn active" id="r05" onclick="setRate(0.5)">0.5 元/km</div>
        <div class="option-btn" id="r06" onclick="setRate(0.6)">0.6 元/km</div>
    </div>

    <div class="section-title">乘车人数</div>
    <div class="btn-group">
        <div class="option-btn" id="p3" onclick="setPax(3)">3 人</div>
        <div class="option-btn active" id="p4" onclick="setPax(4)">4 人</div>
    </div>

    <div class="section-title">各乘客下车里程 (km)</div>
    <input type="number" id="d1" placeholder="乘客1 下车点" oninput="calc()">
    <input type="number" id="d2" placeholder="乘客2 下车点" oninput="calc()">
    <input type="number" id="d3" placeholder="乘客3 下车点" oninput="calc()">
    <input type="number" id="d4" placeholder="乘客4 下车点" oninput="calc()">

    <div id="result" class="result-box">
        <div id="resList">
            <div style="text-align:center;color:#999;padding:10px;">请输入数据</div>
        </div>
        <div class="total-info" id="summary"></div>
    </div>
    
    <a href="javascript:void(0)" class="reset-link" onclick="location.reload()">清空重新输入</a>
</div>

<script>
let currentRate = 0.5;
let currentPax = 4;

function setRate(r) {
    currentRate = r;
    document.getElementById('r05').classList.toggle('active', r === 0.5);
    document.getElementById('r06').classList.toggle('active', r === 0.6);
    calc();
}

function setPax(p) {
    currentPax = p;
    document.getElementById('p3').classList.toggle('active', p === 3);
    document.getElementById('p4').classList.toggle('active', p === 4);
    document.getElementById('d4').style.display = (p === 3) ? 'none' : 'block';
    calc();
}

function calc() {
    const totalDistInput = document.getElementById('totalDist').value;
    const totalDist = parseFloat(totalDistInput);
    const resList = document.getElementById('resList');
    const summary = document.getElementById('summary');

    if (!totalDist || totalDist <= 0) {
        resList.innerHTML = '<div style="text-align:center;color:#999;padding:10px;">等待总里程数据...</div>';
        summary.innerHTML = "";
        return;
    }

    // 基础数据准备
    let paxes = [];
    for(let i=1; i<=currentPax; i++) {
        let dVal = document.getElementById('d'+i).value;
        let d = parseFloat(dVal) || 0;
        paxes.push({ id: i, dist: Math.min(d, totalDist) });
    }

    // 分段平摊核心逻辑
    let sorted = [...paxes].sort((a,b) => a.dist - b.dist);
    let results = {};
    paxes.forEach(p => results[p.id] = 0);

    let prevDist = 0;
    // 初始车上人数即为选中的乘客数
    let currentInCar = currentPax;

    for (let i = 0; i < sorted.length; i++) {
        let segLen = sorted[i].dist - prevDist;
        if (segLen > 0) {
            let segCost = segLen * currentRate;
            let perHead = segCost / currentInCar;
            
            // 为所有还没下车的乘客叠加费用
            sorted.slice(i).forEach(p => results[p.id] += perHead);
        }
        prevDist = sorted[i].dist;
        currentInCar--; // 下车一位乘客，下一段平摊人数减1
    }

    // 渲染结果
    resList.innerHTML = "";
    paxes.forEach(p => {
        resList.innerHTML += `
            <div class="res-item">
                <span>乘客 ${p.id} (${p.dist}km)</span>
                <b>${results[p.id].toFixed(2)} 元</b>
            </div>`;
    });

    summary.innerHTML = `费率: ${currentRate} | 总费: <b>${(totalDist * currentRate).toFixed(2)}</b> 元`;
}
</script>

</body>
</html>
